<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Left At Albuquerque</title>

<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: black;
  height: 100%;
  overflow: hidden;
  font-family: "Courier New", monospace;
  color: #ffb347;
  /* NEVER transform/filter body — forces full layout recalc */
}

/* ── CRT SHELL ──────────────────────────────────────────────────────────
   will-change hoists to compositor. screenFlicker removed from here
   and moved to a cheap dedicated opacity layer. */
.crt {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center, #1a0d05 0%, #000 100%);
  border-radius: 50% / 10%;
  overflow: hidden;
  will-change: opacity;
}

/* ── SCANLINES ──────────────────────────────────────────────────────────
   Static — no animation. The visual comes from the gradient alone.
   Removing the original animation saves a continuous repaint pass. */
.crt::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle, transparent 60%, rgba(0,0,0,0.5)),
    repeating-linear-gradient(
      to bottom,
      rgba(255,180,70,0.07) 0px,
      rgba(255,180,70,0.07) 1px,
      transparent 2px,
      transparent 3px
    );
  pointer-events: none;
  z-index: 5;
}

/* ── NOISE ──────────────────────────────────────────────────────────────
   Original used repeating-radial-gradient with noiseShift — very heavy.
   Replaced with an SVG noise texture + translateY-only animation.
   translateY is GPU-composited, zero main-thread cost. */
.noise {
  position: absolute;
  inset: -50% 0;
  background-image:
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  opacity: 0.12;
  animation: noiseDrift 0.5s steps(2) infinite;
  pointer-events: none;
  will-change: transform;
  z-index: 3;
}
@keyframes noiseDrift {
  0%   { transform: translateY(0);   }
  50%  { transform: translateY(3px); }
  100% { transform: translateY(0);   }
}

/* ── SCREEN CONTAINER ─────────────────────────────────────────────────── */
.screen {
  position: relative;
  text-align: center;
  z-index: 10;
}

/* ── MAIN IMAGE ─────────────────────────────────────────────────────────
   will-change: transform keeps it on the compositor so JS glitch
   transforms never trigger a repaint. */
.screen img {
  max-width: 75vw;
  opacity: 0;
  transform: scale(0.98) translateZ(0);
  transition: opacity 1.2s, transform 1.2s;
  filter:
    brightness(1.2) contrast(1.3) saturate(1.2)
    drop-shadow(0 0 18px rgba(255,180,70,0.7));
  will-change: transform, opacity;
}
.screen img.visible {
  opacity: 1;
  transform: scale(1) translateZ(0);
}

/* Gentle idle warp — replaces always-on rgbShift + screenWarp.
   One slow animation, GPU-only. */
.screen img.idle {
  animation: idleWarp 6s ease-in-out infinite;
}
@keyframes idleWarp {
  0%, 100% { transform: scale(1.000, 1.000) translateZ(0); }
  50%       { transform: scale(1.005, 0.995) translateZ(0); }
}

/* ── TERMINAL ─────────────────────────────────────────────────────────── */
.terminal {
  position: absolute;
  top: 20%;
  width: 100%;
  letter-spacing: 2px;
  z-index: 12;
}

/* ── ENTER PROMPT ───────────────────────────────────────────────────────
   step-start blink = no intermediate repaints between states. */
.enter {
  margin-top: 30px;
  opacity: 0;
  cursor: pointer;
  animation: blink 1s step-start infinite;
  will-change: opacity;
}
@keyframes blink {
  50% { opacity: 1; }
}

/* ── GLITCH BARS ─────────────────────────────────────────────────────────
   Thin elements — original animation kept. will-change prevents
   promotion cost on each paint. */
.glitch-bars {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 15;
}
.glitch-bars::before,
.glitch-bars::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 6px;
  background: rgba(255,180,70,0.9);
  will-change: top;
}
.glitch-bars::before { animation: glitch1 4s infinite linear; }
.glitch-bars::after  { animation: glitch2 6s infinite linear; }

@keyframes glitch1 {
  0%   { top:  5%; left: -5px; }
  50%  { top: 60%; left:  5px; }
  100% { top:  5%; left: -5px; }
}
@keyframes glitch2 {
  0%   { top: 80%; left:  3px; }
  50%  { top: 20%; left: -4px; }
  100% { top: 80%; left:  3px; }
}

/* ── TEAR ────────────────────────────────────────────────────────────────
   translateX only = GPU-composited. steps(2) reduces animation frames. */
.tear {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to right,
    transparent 0px,
    rgba(255,180,70,0.04) 1px,
    transparent 3px
  );
  animation: tearMove 0.2s steps(2) infinite;
  pointer-events: none;
  will-change: transform;
  z-index: 6;
}
@keyframes tearMove {
  100% { transform: translateX(2px); }
}

/* ── TRACKING BAR ────────────────────────────────────────────────────────
   JS-driven, opacity + translateY only. */
.tracking {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  will-change: transform, opacity;
  z-index: 7;
  background: linear-gradient(to bottom, transparent, rgba(255,180,70,0.12), transparent);
}

/* ── SYNC ROLL ───────────────────────────────────────────────────────────
   JS-driven translateY sweep. */
.sync-roll {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  will-change: transform, opacity;
  z-index: 9;
  background: linear-gradient(to bottom, transparent, rgba(255,180,70,0.15), transparent);
}

/* ── GHOST ───────────────────────────────────────────────────────────────
   Blur only fires during brief flash — will-change avoids re-promotion. */
.ghost {
  position: absolute;
  inset: 0;
  background: url("left.png") center/contain no-repeat;
  opacity: 0;
  filter: blur(4px) brightness(1.5);
  pointer-events: none;
  will-change: opacity;
  z-index: 2;
}

/* ── FLASH OVERLAY ───────────────────────────────────────────────────────
   NEW: replaces document.body.style.filter = "brightness(2)".
   Opacity change on a flat div = GPU-only, zero repaint. */
.flash {
  position: absolute;
  inset: 0;
  background: rgba(255, 178, 60, 0.5);
  opacity: 0;
  pointer-events: none;
  will-change: opacity;
  z-index: 20;
}

/* ── JITTER LAYER ────────────────────────────────────────────────────────
   NEW: replaces document.body.style.transform.
   Translating this composited div = no layout recalc, ever. */
.jitter {
  position: absolute;
  inset: 0;
  pointer-events: none;
  will-change: transform;
  z-index: 19;
}

/* ── VHS WARP HELPER ─────────────────────────────────────────────────────
   NEW: replaces mutating .crt's animation property (forced restyle).
   Skew stays inside the compositor on this layer. */
.vhs-warp {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  will-change: transform, opacity;
  background: rgba(255,180,70,0.03);
  z-index: 8;
}

/* ── VIGNETTE ─────────────────────────────────────────────────────────── */
.overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7));
  pointer-events: none;
  z-index: 11;
}

/* ── SCREEN FLICKER ──────────────────────────────────────────────────────
   Was on .crt at 0.15s (67fps repaints — brutal).
   Now a tiny opacity layer at 0.5s with step-start. */
.flicker {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.04);
  animation: screenFlicker 0.5s step-start infinite;
  pointer-events: none;
  will-change: opacity;
  z-index: 4;
}
@keyframes screenFlicker {
  50% { opacity: 0; }
}

/* ── BOOT FLASH ───────────────────────────────────────────────────────── */
.boot {
  position: fixed;
  inset: 0;
  background: #ffb347;
  animation: boot 0.4s forwards;
  pointer-events: none;
  z-index: 100;
}
@keyframes boot {
  to { opacity: 0; }
}
</style>
</head>

<body>

<div class="boot"></div>

<div class="crt" id="crt">

  <!-- GPU-composited layers, ordered by z-index -->
  <div class="noise"></div>
  <div class="flicker"></div>

  <div class="screen">
    <div class="terminal" id="terminal"></div>
    <img src="left.png" id="mainImage" alt="Left at Albuquerque">
    <div class="ghost"   id="ghost"></div>
    <div class="enter"   id="enterBtn">&gt; ENTER _</div>
  </div>

  <div class="glitch-bars"></div>
  <div class="tear"></div>
  <div class="tracking"  id="tracking"></div>
  <div class="vhs-warp"  id="vhsWarp"></div>
  <div class="sync-roll" id="syncRoll"></div>
  <div class="jitter"    id="jitter"></div>
  <div class="flash"     id="flash"></div>
  <div class="overlay"></div>

</div>

<script>
"use strict";

const terminal = document.getElementById("terminal");
const image    = document.getElementById("mainImage");
const enterBtn = document.getElementById("enterBtn");
const ghost    = document.getElementById("ghost");
const tracking = document.getElementById("tracking");
const syncRoll = document.getElementById("syncRoll");
const jitter   = document.getElementById("jitter");
const flash    = document.getElementById("flash");
const vhsWarp  = document.getElementById("vhsWarp");

/* ── TYPEWRITER ─────────────────────────────────────────────────────── */
const lines   = ["INITIALIZING...", "SIGNAL LOCKED", "LEFT AT ALBUQUERQUE"];
let   lineIdx = 0;

function typeLine(text, cb) {
  let j = 0;
  const id = setInterval(() => {
    terminal.innerHTML += text[j++];
    if (j >= text.length) {
      clearInterval(id);
      terminal.innerHTML += "<br>";
      setTimeout(cb, 400);
    }
  }, 30);
}

function runSequence() {
  if (lineIdx < lines.length) typeLine(lines[lineIdx++], runSequence);
  else setTimeout(showMain, 500);
}

function showMain() {
  terminal.style.opacity = "0";
  image.classList.add("visible");
  setTimeout(() => {
    image.classList.add("idle");    /* gentle idle warp starts */
    enterBtn.style.opacity = "1";
  }, 1300);
}

/* ── GLITCH ENGINE ──────────────────────────────────────────────────────

   ORIGINAL PROBLEMS:
   ─ document.body.style.transform   → full layout recalc every frame
   ─ document.body.style.filter      → forces full page repaint
   ─ .crt.style.animation = "vhsWarp..." → forces restyle on entire subtree
   ─ burst spawning: setTimeout(randomGlitch, rnd*300) × 3 inside the
     glitch function itself → exponential setTimeout accumulation
   ─ No minimum gap → effects stack, compounding the cost

   FIXES:
   ─ All visual effects use dedicated GPU layers (transform/opacity only)
   ─ Single chained setTimeout — no burst spawning
   ─ glitchLocked flag prevents stacking
   ─ Minimum next-glitch interval enforced                               */

let glitchLocked  = false;
let glitchTimeout = null;

function doGlitch() {
  if (glitchLocked) return;
  glitchLocked = true;

  const type = Math.floor(Math.random() * 5);
  const dur  = Math.random() * 170 + 80;

  switch (type) {

    case 0: { /* JITTER — translate on .jitter layer, never body */
      const tx = (Math.random() * 10 - 5).toFixed(1);
      const ty = (Math.random() * 6  - 3).toFixed(1);
      jitter.style.transform = `translate(${tx}px,${ty}px)`;
      setTimeout(() => { jitter.style.transform = ""; }, dur);
      break;
    }

    case 1: { /* RGB SHIFT — image layer only */
      const tx = (Math.random() * 6  - 3).toFixed(1);
      const sk = (Math.random() * 3.5 - 1.75).toFixed(1);
      const hr = (Math.random() * 40 - 20).toFixed();
      image.classList.remove("idle");
      image.style.transform = `translateZ(0) translate(${tx}px,0) skewX(${sk}deg)`;
      image.style.filter    =
        `hue-rotate(${hr}deg) contrast(1.8) brightness(1.3)` +
        ` drop-shadow(0 0 18px rgba(255,180,70,0.7))`;
      setTimeout(() => {
        image.style.transform = "";
        image.style.filter    = "";
        image.classList.add("idle");
      }, dur);
      break;
    }

    case 2: { /* VHS WARP — skew on .vhs-warp layer, never .crt */
      const sk = (Math.random() * 2.5 - 1.25).toFixed(1);
      const ty = (Math.random() * 3.5 - 1.75).toFixed(1);
      vhsWarp.style.opacity   = "1";
      vhsWarp.style.transform = `skewX(${sk}deg) translateY(${ty}px)`;
      setTimeout(() => {
        vhsWarp.style.opacity   = "0";
        vhsWarp.style.transform = "";
      }, 260);
      break;
    }

    case 3: { /* SYNC ROLL — translateY sweep via Web Animations API */
      syncRoll.style.opacity = "1";
      const anim = syncRoll.animate(
        [{ transform: "translateY(-100%)" },
         { transform: "translateY(110%)"  }],
        { duration: 370, easing: "ease-in" }
      );
      anim.onfinish = () => { syncRoll.style.opacity = "0"; };
      break;
    }

    case 4: { /* GHOST FLASH — opacity only */
      ghost.style.opacity = "0.25";
      setTimeout(() => { ghost.style.opacity = "0"; }, 130);
      break;
    }
  }

  /* BRIGHTNESS FLASH — opacity overlay, never body filter */
  if (Math.random() > 0.82) {
    flash.style.opacity = "0.65";
    setTimeout(() => { flash.style.opacity = "0"; }, 75);
  }

  /* Unlock after effect clears, then schedule next glitch once */
  setTimeout(() => { glitchLocked = false; }, dur + 60);
  glitchTimeout = setTimeout(doGlitch, Math.random() * 4200 + 1600);
}

/* ── ENTER / NAVIGATE ───────────────────────────────────────────────── */
function enterSite() {
  clearTimeout(glitchTimeout);
  flash.style.transition = "opacity 0.8s";
  flash.style.opacity    = "1";
  setTimeout(() => { window.location.href = "/home"; }, 850);
}

enterBtn.addEventListener("click",   enterSite);
document.addEventListener("keydown", enterSite);

/* ── INIT ───────────────────────────────────────────────────────────── */
setTimeout(runSequence, 500);
setTimeout(doGlitch,   2300);
</script>

</body>
</html>
